name: Release Docker Image
on:
  push:
    branches:
      - 'release-*'
permissions:
  contents: read
  packages: write
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm test
  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: version
        run: |
          BRANCH="${{ github.ref_name }}"
          VERSION="${BRANCH#release-}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          provenance: false
          tags: |
            ghcr.io/jayrchamp/platform-agent-test-app:${{ steps.version.outputs.version }}
            ghcr.io/jayrchamp/platform-agent-test-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
